name: Release

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"

          if echo "$MSG" | grep -qiE "^breaking:"; then
            BUMP=major
          elif echo "$MSG" | grep -qiE "^feat:"; then
            BUMP=minor
          elif echo "$MSG" | grep -qiE "^fix:"; then
            BUMP=patch
          else
            echo "No release prefix found - skipping release."
            echo "release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          if [ "$PATCH" = "0" ]; then
            NEW_VERSION="${MAJOR}.${MINOR}"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release=true" >> $GITHUB_OUTPUT

      - name: Tag and create release
        if: steps.version.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --generate-notes

  build:
    needs: version
    if: needs.version.outputs.release == 'true'
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libportaudio2 patchelf

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run python -m nuitka `
            --onefile `
            --include-package-data=sounddevice `
            --include-package-data=prism `
            --windows-console-mode=force `
            --output-filename=chords `
            main.py

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          uv run python -m nuitka \
            --onefile \
            --include-package-data=sounddevice \
            --include-package-data=prism \
            --output-filename=chords \
            main.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path chords.exe, data -DestinationPath chords-windows.zip

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: zip -r chords-${{ matrix.platform }}.zip chords data/

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.version.outputs.version }} chords-${{ matrix.platform }}.zip
